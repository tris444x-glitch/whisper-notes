<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="悄悄话">
<meta name="theme-color" content="#f5f0e8">
<title>悄悄话</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Ma+Shan+Zheng&display=swap');

  :root {
    --paper: #f5f0e8;
    --paper-dark: #ede7d9;
    --ink: #2c2416;
    --ink-soft: #7a6e5f;
    --accent: #c4956a;
    --accent-light: #f0e6d3;
    --pink: #e8a0a0;
    --pink-light: #fdf0f0;
    --line: rgba(44,36,22,0.1);
    --shadow: rgba(44,36,22,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--paper);
    font-family: 'Noto Serif SC', serif;
    color: var(--ink);
    overflow-x: hidden;
  }

  /* Subtle paper texture via repeating lines */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: repeating-linear-gradient(
      transparent 0px, transparent 31px,
      rgba(44,36,22,0.06) 31px, rgba(44,36,22,0.06) 32px
    );
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── SETUP SCREEN ── */
  #setup-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    gap: 2rem;
  }

  .logo {
    text-align: center;
  }
  .logo-icon {
    font-size: 48px;
    display: block;
    margin-bottom: 0.5rem;
  }
  .logo h1 {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 2.2rem;
    color: var(--ink);
    letter-spacing: 0.05em;
  }
  .logo p {
    font-size: 0.85rem;
    color: var(--ink-soft);
    margin-top: 0.4rem;
    letter-spacing: 0.02em;
  }

  .setup-card {
    background: white;
    border-radius: 16px;
    padding: 1.8rem;
    width: 100%;
    max-width: 340px;
    box-shadow: 0 2px 20px var(--shadow), 0 0 0 1px var(--line);
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .setup-card label {
    font-size: 0.78rem;
    color: var(--ink-soft);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 0.3rem;
  }

  .setup-card input {
    width: 100%;
    padding: 0.75rem 1rem;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: var(--paper);
    font-family: 'Noto Serif SC', serif;
    font-size: 1rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  .setup-card input:focus {
    border-color: var(--accent);
    background: white;
  }
  .setup-card input::placeholder {
    color: var(--ink-soft);
    opacity: 0.6;
  }

  .btn-primary {
    width: 100%;
    padding: 0.85rem;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 10px;
    font-family: 'Noto Serif SC', serif;
    font-size: 0.95rem;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: background 0.2s, transform 0.1s;
    -webkit-appearance: none;
  }
  .btn-primary:active { transform: scale(0.98); }

  .divider {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    color: var(--ink-soft);
    font-size: 0.8rem;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  /* ── MAIN SCREEN ── */
  #main-screen {
    flex: 1;
    display: none;
    flex-direction: column;
  }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.2rem 0.6rem;
    border-bottom: 1px solid var(--line);
  }
  .room-info {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .room-label {
    font-size: 0.75rem;
    color: var(--ink-soft);
  }
  .room-id {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 1rem;
    color: var(--accent);
  }
  .connection-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #ccc;
    transition: background 0.3s;
  }
  .connection-dot.online { background: #7db87d; }

  .mode-tabs {
    display: flex;
    gap: 0;
    background: var(--paper-dark);
    border-radius: 8px;
    padding: 2px;
  }
  .mode-tab {
    padding: 0.3rem 0.75rem;
    border-radius: 6px;
    font-size: 0.78rem;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Noto Serif SC', serif;
    border: none;
    background: none;
  }
  .mode-tab.active {
    background: white;
    color: var(--ink);
    box-shadow: 0 1px 4px var(--shadow);
  }

  /* ── NOTES WALL ── */
  #notes-panel {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.85rem;
  }

  .note-item {
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
    animation: noteIn 0.3s ease;
  }
  @keyframes noteIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .note-item.mine { align-items: flex-end; }
  .note-item.theirs { align-items: flex-start; }

  .note-bubble {
    max-width: 82%;
    padding: 0.85rem 1rem;
    border-radius: 4px 16px 16px 16px;
    position: relative;
    box-shadow: 2px 3px 8px var(--shadow);
  }
  .note-item.mine .note-bubble {
    border-radius: 16px 4px 16px 16px;
    background: #fff9c4;
    border-top: 3px solid #e8d44d;
  }
  .note-item.theirs .note-bubble {
    background: #ffd6d6;
    border-top: 3px solid var(--pink);
  }

  /* Folded corner effect */
  .note-bubble::after {
    content: '';
    position: absolute;
    top: 0;
    width: 14px;
    height: 14px;
  }
  .note-item.mine .note-bubble::after {
    right: 0;
    background: linear-gradient(135deg, #fff9c4 50%, rgba(0,0,0,0.06) 50%);
    border-radius: 0 4px 0 0;
  }
  .note-item.theirs .note-bubble::after {
    left: 0;
    background: linear-gradient(225deg, #ffd6d6 50%, rgba(0,0,0,0.06) 50%);
    border-radius: 4px 0 0 0;
  }

  .note-text {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 1.05rem;
    line-height: 1.6;
    color: var(--ink);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .note-meta {
    font-size: 0.68rem;
    color: var(--ink-soft);
    display: flex;
    gap: 0.4rem;
    align-items: center;
    padding: 0 0.2rem;
  }
  .note-author {
    font-weight: 600;
    color: var(--accent);
  }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.8rem;
    color: var(--ink-soft);
    padding: 3rem;
    text-align: center;
  }
  .empty-icon { font-size: 3rem; opacity: 0.5; }
  .empty-text { font-family: 'Ma Shan Zheng', cursive; font-size: 1.1rem; }
  .empty-sub { font-size: 0.8rem; opacity: 0.7; }

  /* ── WIDGET VIEW ── */
  #widget-panel {
    flex: 1;
    display: none;
    flex-direction: column;
    padding: 0.8rem;
    gap: 0.6rem;
    overflow-y: auto;
  }

  .widget-hint {
    font-size: 0.72rem;
    color: var(--ink-soft);
    text-align: center;
    padding: 0.3rem;
    opacity: 0.7;
  }

  .widget-note {
    background: white;
    border-left: 3px solid var(--accent);
    border-radius: 2px 12px 12px 2px;
    padding: 0.75rem 1rem;
    box-shadow: 1px 2px 6px var(--shadow);
    animation: noteIn 0.25s ease;
  }
  .widget-note.mine {
    border-left-color: #e8d44d;
    background: #fffef5;
  }
  .widget-note.theirs {
    border-left-color: var(--pink);
    background: #fff8f8;
  }
  .widget-note-text {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 1rem;
    color: var(--ink);
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .widget-note-meta {
    font-size: 0.65rem;
    color: var(--ink-soft);
    margin-top: 0.35rem;
  }

  /* ── COMPOSE BAR ── */
  #compose-area {
    border-top: 1px solid var(--line);
    padding: 0.85rem;
    display: flex;
    gap: 0.6rem;
    align-items: flex-end;
    background: var(--paper);
  }

  #compose-area.hidden { display: none; }

  #message-input {
    flex: 1;
    min-height: 42px;
    max-height: 120px;
    padding: 0.65rem 0.85rem;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: white;
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 1rem;
    color: var(--ink);
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.4;
    overflow-y: hidden;
    -webkit-appearance: none;
  }
  #message-input:focus { border-color: var(--accent); }
  #message-input::placeholder { color: var(--ink-soft); opacity: 0.5; }

  #send-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--ink);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, background 0.15s;
    -webkit-appearance: none;
  }
  #send-btn:active { transform: scale(0.9); }
  #send-btn svg { width: 18px; height: 18px; fill: var(--paper); }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 5rem;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--ink);
    color: var(--paper);
    padding: 0.5rem 1.2rem;
    border-radius: 20px;
    font-size: 0.82rem;
    opacity: 0;
    transition: all 0.25s;
    z-index: 99;
    white-space: nowrap;
    pointer-events: none;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="app">

  <!-- SETUP SCREEN -->
  <div id="setup-screen">
    <div class="logo">
      <span class="logo-icon">🕊️</span>
      <h1>悄悄话</h1>
      <p>只属于你们两个人的便利贴</p>
    </div>

    <div class="setup-card">
      <div>
        <label>你的名字</label>
        <input type="text" id="name-input" placeholder="给自己起个昵称" maxlength="10" autocomplete="off">
      </div>
      <div>
        <label>房间码</label>
        <input type="text" id="room-input" placeholder="输入一个你们的暗号" maxlength="20" autocomplete="off" style="text-transform: lowercase;">
      </div>
      <button class="btn-primary" onclick="joinRoom()">进入 →</button>
      <div class="divider">或者</div>
      <button class="btn-primary" style="background: var(--accent);" onclick="createRoom()">生成随机房间码</button>
    </div>

    <p style="font-size:0.75rem; color: var(--ink-soft); text-align:center; max-width: 280px; line-height:1.6;">
      两台手机输入相同的名字和房间码，就能互相看到便利贴啦 ✨
    </p>
  </div>

  <!-- MAIN SCREEN -->
  <div id="main-screen">
    <div class="top-bar">
      <div class="room-info">
        <div class="connection-dot" id="dot"></div>
        <span class="room-label">房间 #</span>
        <span class="room-id" id="room-display"></span>
      </div>
      <div class="mode-tabs">
        <button class="mode-tab active" onclick="setMode('chat')" id="tab-chat">对话</button>
        <button class="mode-tab" onclick="setMode('widget')" id="tab-widget">桌面</button>
      </div>
    </div>

    <!-- CHAT PANEL -->
    <div id="notes-panel">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">🌸</div>
        <div class="empty-text">还没有便利贴</div>
        <div class="empty-sub">发一条悄悄话给对方吧</div>
      </div>
    </div>

    <!-- WIDGET PANEL -->
    <div id="widget-panel">
      <div class="widget-hint">📌 桌面模式 — 添加到主屏幕后，这里会显示最新便利贴</div>
    </div>

    <!-- COMPOSE -->
    <div id="compose-area">
      <textarea id="message-input" placeholder="写点什么..." rows="1"></textarea>
      <button id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 21L23 12L2 3V10L17 12L2 14V21Z"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ── FIREBASE CONFIG ──────────────────────────────────────────
// 🔧 把这里换成你自己的 Firebase 配置
const firebaseConfig = {
  apiKey: "AIzaSyBJUFLfvGurGqDTxtJCev-wUvdjcS5IJtY",
  authDomain: "whisper-note-1198a.firebaseapp.com",
  databaseURL: "https://whisper-note-1198a-default-rtdb.firebaseio.com",
  projectId: "whisper-note-1198a",
  storageBucket: "whisper-note-1198a.firebasestorage.app",
  messagingSenderId: "167831248141",
  appId: "1:167831248141:web:f8d874ab2eca61625a6444"
};

// ── STATE ────────────────────────────────────────────────────
let db, messagesRef;
let myName = '';
let roomId = '';
let mode = 'chat';
let messages = [];

// ── INIT ─────────────────────────────────────────────────────
function initFirebase() {
  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    return true;
  } catch(e) {
    return false;
  }
}

function isFirebaseConfigured() {
  return firebaseConfig.apiKey !== 'AIzaSyBJUFLfvGurGqDTxtJCev-wUvdjcS5IJtY';
}

// ── SETUP ────────────────────────────────────────────────────
function createRoom() {
  const words = ['星空','月光','樱花','微风','柔软','温暖','悄悄','慢慢','蜜糖','晴天'];
  const w1 = words[Math.floor(Math.random()*words.length)];
  const w2 = words[Math.floor(Math.random()*words.length)];
  const num = Math.floor(Math.random()*100);
  document.getElementById('room-input').value = w1+w2+num;
}

function joinRoom() {
  const name = document.getElementById('name-input').value.trim();
  const room = document.getElementById('room-input').value.trim().toLowerCase();

  if (!name) { showToast('请输入你的名字 🌸'); return; }
  if (!room) { showToast('请输入房间码 🔑'); return; }

  myName = name;
  roomId = room;

  localStorage.setItem('wn_name', name);
  localStorage.setItem('wn_room', room);

  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'flex';
  document.getElementById('room-display').textContent = room;

  if (!isFirebaseConfigured()) {
    useDemoMode();
    return;
  }

  if (!db) initFirebase();
  connectToRoom();
}

// ── DEMO MODE (without Firebase) ──────────────────────────────
function useDemoMode() {
  showToast('演示模式：消息仅在本设备显示');
  document.getElementById('dot').classList.add('online');
  // Load any saved demo messages
  const saved = localStorage.getItem('wn_demo_' + roomId);
  if (saved) {
    messages = JSON.parse(saved);
    renderMessages();
  }
}

function saveDemoMessages() {
  localStorage.setItem('wn_demo_' + roomId, JSON.stringify(messages.slice(-20)));
}

// ── FIREBASE CONNECTION ───────────────────────────────────────
function connectToRoom() {
  const path = 'rooms/' + roomId + '/messages';
  messagesRef = db.ref(path);
  db.ref('.info/connected').on('value', snap => {
    document.getElementById('dot').classList.toggle('online', !!snap.val());
  });

  messagesRef.limitToLast(20).on('value', snap => {
    messages = [];
    snap.forEach(child => {
      messages.push({ id: child.key, ...child.val() });
    });
    renderMessages();
  });
}

// ── SEND ──────────────────────────────────────────────────────
function sendMessage() {
  const input = document.getElementById('message-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  autoResize(input);

  const msg = {
    text,
    author: myName,
    ts: Date.now()
  };

  if (!isFirebaseConfigured()) {
    msg.id = Date.now().toString();
    messages.push(msg);
    if (messages.length > 20) messages.shift();
    saveDemoMessages();
    renderMessages();
    return;
  }

  messagesRef.push(msg).catch(() => showToast('发送失败，请检查网络'));
}

// ── RENDER ────────────────────────────────────────────────────
function renderMessages() {
  const empty = document.getElementById('empty-state');
  const panel = document.getElementById('notes-panel');
  const widget = document.getElementById('widget-panel');

  if (messages.length === 0) {
    empty.style.display = 'flex';
    panel.querySelectorAll('.note-item').forEach(el => el.remove());
    widget.querySelectorAll('.widget-note').forEach(el => el.remove());
    return;
  }

  empty.style.display = 'none';

  // Chat view
  const existing = new Set([...panel.querySelectorAll('.note-item')].map(el => el.dataset.id));
  messages.forEach(msg => {
    if (existing.has(msg.id)) return;
    const isMine = msg.author === myName;
    const div = document.createElement('div');
    div.className = 'note-item ' + (isMine ? 'mine' : 'theirs');
    div.dataset.id = msg.id;
    div.innerHTML = `
      <div class="note-bubble">
        <div class="note-text">${escHtml(msg.text)}</div>
      </div>
      <div class="note-meta">
        <span class="note-author">${escHtml(msg.author)}</span>
        <span>${fmtTime(msg.ts)}</span>
      </div>
    `;
    panel.appendChild(div);
  });
  panel.scrollTop = panel.scrollHeight;

  // Widget view
  const hint = widget.querySelector('.widget-hint');
  widget.querySelectorAll('.widget-note').forEach(el => el.remove());
  const recent = messages.slice(-5).reverse();
  recent.forEach(msg => {
    const isMine = msg.author === myName;
    const div = document.createElement('div');
    div.className = 'widget-note ' + (isMine ? 'mine' : 'theirs');
    div.innerHTML = `
      <div class="widget-note-text">${escHtml(msg.text)}</div>
      <div class="widget-note-meta">${escHtml(msg.author)} · ${fmtTime(msg.ts)}</div>
    `;
    hint.after(div);
  });
}

// ── MODE SWITCH ───────────────────────────────────────────────
function setMode(m) {
  mode = m;
  document.getElementById('notes-panel').style.display = m === 'chat' ? 'flex' : 'none';
  document.getElementById('widget-panel').style.display = m === 'widget' ? 'flex' : 'none';
  document.getElementById('compose-area').classList.toggle('hidden', m === 'widget');
  document.getElementById('tab-chat').classList.toggle('active', m === 'chat');
  document.getElementById('tab-widget').classList.toggle('active', m === 'widget');
  if (m === 'chat') {
    const panel = document.getElementById('notes-panel');
    panel.scrollTop = panel.scrollHeight;
  }
}

// ── UTILS ─────────────────────────────────────────────────────
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function fmtTime(ts) {
  const d = new Date(ts);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return '刚刚';
  if (diff < 3600000) return Math.floor(diff/60000) + '分钟前';
  if (diff < 86400000) return d.getHours() + ':' + String(d.getMinutes()).padStart(2,'0');
  return (d.getMonth()+1) + '/' + d.getDate();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ── EVENTS ────────────────────────────────────────────────────
document.getElementById('message-input').addEventListener('input', function() {
  autoResize(this);
});

document.getElementById('message-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Restore session
window.addEventListener('load', () => {
  const savedName = localStorage.getItem('wn_name');
  const savedRoom = localStorage.getItem('wn_room');
  if (savedName) document.getElementById('name-input').value = savedName;
  if (savedRoom) document.getElementById('room-input').value = savedRoom;
});
</script>
</body>
</html>
